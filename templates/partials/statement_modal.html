<div class="modal fade" id="statementModal" tabindex="-1" aria-labelledby="statementModalLabel" aria-hidden="true">
	<div class="modal-dialog position-relative">
		<div class="loading-overlay position-absolute top-0 start-0 w-100 h-100 bg-light bg-opacity-75 align-items-center justify-content-center flex-column" id="statementModalLoader" style="display: none;">
			<div class="text-primary fw-semibold fs-5 bg-white px-3 py-2 rounded-3 shadow-sm mb-3">Trwa przygotowywanie wyciągu...</div>
			<div class="loader"></div>
		</div>
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title" id="statementModalLabel"><i class="bi bi-file-earmark-text me-2"></i>Generuj Wyciąg</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			</div>
			<div class="modal-body">
				<p class="text-muted small mb-3">Wyciąg otworzy się w nowej karcie przeglądarki.</p>
				<div class="mb-3">
					<label for="timeRange" class="form-label">Okres</label>
					<select id="timeRange" class="form-select">
					</select>
				</div>
				<div class="mb-3">
					<label for="startDate" class="form-label">Data początkowa</label>
					<input type="datetime-local" id="startDate" class="form-control" required>
				</div>
				<div class="mb-3">
					<label for="endDate" class="form-label">Data końcowa</label>
					<input type="datetime-local" id="endDate" class="form-control" required>
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Anuluj</button>
				<button type="button" id="generateStatement" class="btn btn-primary"><i class="bi bi-printer me-2"></i>Generuj</button>
			</div>
		</div>
	</div>
</div>
