<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{% block title %}Monitor Ruchu MikroTik{% endblock %}</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	<script src="{{ url_for('static', path='js/theme.js') }}"></script>
	{% block head_extra %}{% endblock %}
	{% block theme_styles %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
	<div class="d-flex justify-content-end align-items-center pt-3 pe-3">
		<button id="themeToggle" class="btn btn-outline-secondary position-fixed top-0 end-0 m-3" title="Zmień motyw">
			<i id="themeIcon" class="bi bi-moon"></i>
		</button>
	</div>
	<div class="container py-4">
		{% block content %}{% endblock %}
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	{% block scripts %}{% endblock %}
</body>
</html>
